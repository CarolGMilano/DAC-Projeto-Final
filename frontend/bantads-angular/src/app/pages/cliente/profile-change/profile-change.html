<div class="flex flex-col h-screen w-full bg-zinc-800 font-mono">

  <div class="flex w-full items-center justify-between border-b border-zinc-700 bg-zinc-900 px-6 py-4 text-sm text-zinc-300">
    <div class="flex items-center gap-3">
      <span class="text-blue-500 font-bold animate-pulse">●</span>
      <span class="tracking-widest uppercase text-xs">BANTADS // PROFILE</span>
    </div>
    
    <div class="flex items-center gap-8">
       <button (click)="voltar()" class="text-zinc-400 hover:text-white transition-colors text-xs border border-zinc-700 px-4 py-1 hover:bg-zinc-700">
        VOLTAR [ESC]
      </button>
    </div>
  </div>

  <div class="flex-1 flex overflow-hidden" *ngIf="cliente">

    <form class="flex-1 p-8 overflow-y-auto bg-zinc-800">
      
      <div class="max-w-6xl mx-auto">
        <header class="mb-12">
          <h1 class="text-4xl font-bold text-white mb-2">Alterar Perfil</h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-x-20 gap-y-10">
          
          <section class="space-y-6">
            <h2 class="text-blue-500 text-xs font-bold uppercase tracking-widest border-b border-zinc-700 pb-2">Informações de Acesso</h2>
            
            <div class="space-y-4">
              <div class="group">
                <label class="block text-[12px] uppercase text-zinc-500 mb-2 group-focus-within:text-blue-400">CPF</label>
                <input type="text" [value]="cliente.cpf" readonly 
                  class="w-full bg-zinc-900/50 border border-zinc-700 p-4 text-zinc-600 outline-none cursor-not-allowed">
              </div>

              <div class="group">
                <label class="block text-[12px] uppercase text-zinc-400 mb-2 group-focus-within:text-blue-400">Nome</label>
                <input type="text" [(ngModel)]="cliente.nome" name="nome" class="w-full bg-zinc-700/30 border border-zinc-600 p-4 text-white outline-none focus:border-white transition-all">
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="block text-[12px] uppercase text-zinc-400 mb-2">E-mail</label>
                  <input type="email" [(ngModel)]="cliente.email" name="email" class="w-full bg-zinc-700/30 border border-zinc-600 p-4 text-white outline-none focus:border-white">
                </div>
                <div>
                  <label class="block text-[12px] uppercase text-zinc-400 mb-2">Telefone</label>
                  <input type="text" [(ngModel)]="cliente.telefone" name="telefone" class="w-full bg-zinc-700/30 border border-zinc-600 p-4 text-white outline-none focus:border-white">
                </div>
              </div>
            </div>
          </section>

          <section class="space-y-10">
            <h2 class="text-blue-500 text-xs font-bold uppercase tracking-widest border-b border-zinc-700 pb-2">Endereço e Localização</h2>
            
            <div class="space-y-4">
              <div class="grid grid-cols-3 gap-4">
                <div class="col-span-1">
                  <label class="block text-[12px] uppercase text-zinc-400 mb-2">CEP</label>
                  <input type="text" [(ngModel)]="cliente.endereco!.cep" name="cep" class="w-full bg-zinc-700/30 border border-zinc-600 p-4 text-white outline-none focus:border-white">
                </div>
                <div class="col-span-2">
                  <label class="block text-[12px] uppercase text-zinc-400 mb-2">Logradouro</label>
                  <input type="text" [(ngModel)]="cliente.endereco!.logradouro" name="logradouro" class="w-full bg-zinc-700/30 border border-zinc-600 p-4 text-white outline-none focus:border-white">
                </div>
              </div>

              <div class="grid grid-cols-3 gap-4">
                <div class="col-span-1">
                  <label class="block text-[12px] uppercase text-zinc-400 mb-2">Número</label>
                  <input type="text" [(ngModel)]="cliente.endereco!.numero" name="numero" class="w-full bg-zinc-700/30 border border-zinc-600 p-4 text-white outline-none focus:border-white">
                </div>
                <div class="col-span-2">
                  <label class="block text-[12px] uppercase text-zinc-400 mb-2">Cidade/Estado</label>
                  <input type="text" [(ngModel)]="cliente.endereco!.cidade" name="cidade" class="w-full bg-zinc-700/30 border border-zinc-600 p-4 text-white outline-none focus:border-white">
                </div>
              </div>
            </div>
          </section>
        </div>

        <div class="mt-16 bg-zinc-900 border border-blue-900/30 p-8 flex flex-col md:flex-row justify-between items-center gap-8">
          <div class="flex-1">
            <label class="block text-[10px] uppercase text-blue-400 font-bold mb-3 tracking-widest">Rendimento Mensal (Salário)</label>
            <div class="flex items-center gap-4">
              <span class="text-3xl text-zinc-500 font-bold">R$</span>
              <input type="number" [(ngModel)]="cliente.salario" name="salario" step="0.01" class="bg-transparent text-4xl text-white font-bold outline-none w-full" placeholder="0.00">
            </div>
          </div>
          
            <button type="button" (click)="atualizarPerfil()" class="w-full md:w-80 bg-blue-600 hover:bg-blue-500 text-white py-5 px-10 font-bold text-sm uppercase tracking-[0.3em] transition-all active:scale-95 shadow-2xl">
            Atualizar_Perfil
          </button>
        </div>

      </div>
    </form>
  </div>
</div>
