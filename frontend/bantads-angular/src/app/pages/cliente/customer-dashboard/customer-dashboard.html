<div class="flex flex-col w-full h-full bg-zinc-800 font-mono rounded-lg border border-zinc-700 overflow-hidden shadow-2xl">

  <div class="flex w-full items-center justify-between border-b border-zinc-700 bg-zinc-900 px-6 py-4 text-sm text-zinc-300 flex-none">
    <div class="flex items-center gap-3">
      <span class="text-blue-500 font-bold animate-pulse">●</span>
      <span class="tracking-widest uppercase text-xs">BANTADS // DASHBOARD</span>
    </div>
    <div class="flex items-center gap-8">
      @if (view !== 'SALDO') {
        <button (click)="mudarView('SALDO')" class="text-zinc-400 hover:text-white transition-colors text-xs border border-zinc-700 px-4 py-1 hover:bg-zinc-700">
          VOLTAR [ESC]
        </button>
      }
    </div>
  </div>

  <div class="flex-1 flex flex-col justify-center items-center p-8 md:p-12 bg-zinc-900/30">
    <div class="w-full max-w-2xl flex flex-col items-center">
      
      <section class="flex flex-col items-center mb-6 w-full">
        <span class="text-[10px] uppercase tracking-[0.3em] text-zinc-500 mb-4">Disponível para transações</span>
        <div class="flex items-baseline gap-4">
          <span class="text-xl text-zinc-600 font-bold">R$</span>
          <h1 id="balance" class="text-7xl font-bold text-white tracking-tighter">
            {{cliente.saldo}}
          </h1>
        </div>
      </section>

      @if (view === 'SALDO') {
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full mb-8">
          <button (click)="mudarView('DEPOSITO')" class="bg-zinc-800 border border-zinc-700 p-4 rounded-sm hover:border-blue-500 hover:bg-zinc-700 text-[11px] text-zinc-200 transition-all font-bold uppercase tracking-widest">
            Depositar 
          </button>
          <button (click)="mudarView('TRANSFERENCIA')" class="bg-zinc-800 border border-zinc-700 p-4 rounded-sm hover:border-blue-500 hover:bg-zinc-700 text-[11px] text-zinc-200 transition-all font-bold uppercase tracking-widest">
            Transferir 
          </button>
          <button (click)="mudarView('SAQUE')" class="bg-zinc-800 border border-zinc-700 p-4 rounded-sm hover:border-blue-500 hover:bg-zinc-700 text-[11px] text-zinc-200 transition-all font-bold uppercase tracking-widest">
             Saque 
          </button>
        </div>

        <button class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-sm font-bold text-xs uppercase tracking-[0.5em] transition-colors" (click)="visualizarExtrato()">
          EXTRATO
        </button>
      }

      @if (view === 'DEPOSITO' || view === 'SAQUE') {
        <div class="flex flex-col gap-6 w-full animate-in fade-in duration-300">
          <h2 class="text-xs font-bold uppercase tracking-widest border-b border-zinc-700 pb-2 text-zinc-400">
            {{ view === 'DEPOSITO' ? 'Depósito ' : 'Saque ' }}
          </h2>
          <div class="bg-zinc-900/50 border border-zinc-700 p-8">
            <label class="text-[10px] text-zinc-500 uppercase mb-4 block">Valor da Operação</label>
            <input type="number" [(ngModel)]="valorInput" class="bg-transparent text-5xl text-white outline-none w-full font-bold" placeholder="0.00">
          </div>
          <button (click)="view === 'DEPOSITO' ? depositar() : saque()" class="bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-sm font-bold text-xs uppercase tracking-[0.5em] transition-colors">
            CONFIRMAR {{ view }}
          </button>
        </div>
      }

      @if (view === 'TRANSFERENCIA') {
        <div class="flex flex-col gap-6 w-full animate-in fade-in duration-300">
          <h2 class="text-zinc-400 text-xs font-bold uppercase tracking-widest border-b border-zinc-700 pb-2">Transferência</h2>
          <div class="space-y-4">
            <input type="text" [(ngModel)]="destinatarioInput" placeholder="CONTA DESTINO" class="w-full bg-zinc-900/50 border border-zinc-700 p-4 text-white outline-none focus:border-zinc-500">
            <input type="number" [(ngModel)]="valorInput" placeholder="VALOR R$" class="w-full bg-zinc-900/50 border border-zinc-700 p-4 text-white outline-none focus:border-zinc-500">
          </div>
          <button (click)="transferir()" class="bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-sm font-bold text-xs uppercase tracking-[0.5em] transition-colors">
            TRANSFERIR
          </button>
        </div>
      }
    </div> 
  </div> 
</div>
